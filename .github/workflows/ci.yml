name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

# Annule les exécutions précédentes sur la même branche/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Java requis pour le validateur de conformité Factur-X (Mustangproject).
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Les tests génèrent un échantillon Factur-X dans .artifacts/.
      - name: Unit tests
        run: npm run test

      - name: Conformité Factur-X (Mustangproject / veraPDF)
        run: |
          curl -fsSL -o Mustang-CLI.jar \
            https://repo1.maven.org/maven2/org/mustangproject/Mustang-CLI/2.23.1/Mustang-CLI-2.23.1.jar
          java -jar Mustang-CLI.jar --action validate \
            --source .artifacts/sample-invoice.pdf --disable-file-logging \
            > mustang-report.xml 2>&1 || true
          cat mustang-report.xml
          if grep -q 'status="invalid"' mustang-report.xml; then
            echo "::error::Factur-X non conforme (validation Mustang échouée)"
            exit 1
          fi
          grep -q 'isCompliant=true' mustang-report.xml || {
            echo "::error::PDF/A-3 non conforme"; exit 1;
          }
          echo "Factur-X conforme (PDF/A-3b + EN 16931)."

      - name: Build
        run: npm run build
