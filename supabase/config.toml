# Configuration Supabase pour le projet Factura.
# Voir : https://supabase.com/docs/guides/local-development/cli/config
# La région cible (RGPD) est définie côté projet hébergé : eu-central-1 (Frankfurt).
# Cette config locale est utilisée par `supabase start` (nécessite Docker — non installé ici).

project_id = "factura"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[storage]
enabled = true
file_size_limit = "50MiB"
